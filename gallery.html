	<dialog class="photo-dialog" id="photo-dialog" aria-label="Full-size photo viewer">
		<button class="photo-dialog-close" type="button" aria-label="Close full-size photo">×</button>
		<img id="photo-dialog-img" alt="">
	</dialog>

	<script>
		document.addEventListener("DOMContentLoaded", () => {
			const photoDialog = document.getElementById("photo-dialog");
			const photoDialogImg = document.getElementById("photo-dialog-img");
			const photoDialogClose = photoDialog.querySelector(".photo-dialog-close");
			const photoLinks = Array.from(document.querySelectorAll(".photo-link"));
		
			function thumbPathFromOriginal(originalPath) {
				return originalPath.replace(/(^|\/)originals\//, "$1thumbs/");
			}
		
			function altTextFromFigure(link) {
				return link.closest(".photo-piece")?.querySelector(".photo-meta")?.textContent.trim() || "Gallery photo";
			}
		
			function closePhotoDialog() {
				photoDialog.close();
			}
		
			photoLinks.forEach((link, index) => {
				const originalPath = link.getAttribute("href");
				const image = document.createElement("img");
				const altText = altTextFromFigure(link);
		
				image.src = thumbPathFromOriginal(originalPath);
				image.alt = altText;
				image.decoding = "async";
				image.loading = index === 0 ? "eager" : "lazy";
				image.fetchPriority = index === 0 ? "high" : "low";
		
				link.replaceChildren(image);
				link.setAttribute("aria-label", `Open full-size photo: ${altText}`);
		
				link.addEventListener("click", (event) => {
					event.preventDefault();
					photoDialogImg.src = link.href;
					photoDialogImg.alt = altText;
					photoDialog.showModal();
					document.body.classList.add("photo-dialog-open");
				});
			});
		
			photoDialogClose.addEventListener("click", closePhotoDialog);
		
			photoDialog.addEventListener("click", (event) => {
				if (event.target === photoDialog) {
					closePhotoDialog();
				}
			});
		
			photoDialog.addEventListener("close", () => {
				document.body.classList.remove("photo-dialog-open");
				photoDialogImg.removeAttribute("src");
				photoDialogImg.alt = "";
			});
		});
	</script>
